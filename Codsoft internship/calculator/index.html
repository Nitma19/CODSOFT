<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartCalc Pro</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
    -45deg,
    #0f172a,
    #1e1b4b,
    #0f766e,
    #581c87
    );
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
    color:white;
    overflow:hidden;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    display:flex;
    gap:25px;
    flex-wrap:wrap;
    justify-content:center;
    align-items:center;
}

.calculator{
    width:380px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:30px;
    padding:25px;
    box-shadow:
    0 8px 32px rgba(0,0,0,.4),
    0 0 20px rgba(0,255,255,.2);
}

.header{
    text-align:center;
    margin-bottom:20px;
}

.header h1{
    font-size:2rem;
    background:linear-gradient(
    90deg,
    cyan,
    violet
    );
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.header p{
    opacity:.8;
    font-size:.9rem;
}

.display{
    height:120px;
    border-radius:20px;
    background:rgba(255,255,255,.08);
    padding:15px;
    text-align:right;
    margin-bottom:20px;
    overflow:hidden;
}

.previous{
    font-size:1rem;
    opacity:.6;
    min-height:25px;
}

.current{
    font-size:2.6rem;
    font-weight:bold;
    margin-top:10px;
    transition:.2s;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
}

button{
    border:none;
    height:65px;
    border-radius:18px;
    cursor:pointer;
    color:white;
    font-size:1.2rem;
    background:rgba(255,255,255,.08);
    transition:.25s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 0 15px cyan;
}

button:active{
    transform:scale(.92);
}

.operator{
    color:cyan;
    font-weight:bold;
}

.equal{
    background:linear-gradient(
    135deg,
    #06b6d4,
    #8b5cf6
    );
}

.zero{
    grid-column:span 2;
}

.history{
    width:260px;
    height:580px;
    overflow:auto;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,.08);
    border-radius:30px;
    padding:20px;
}

.history h2{
    text-align:center;
    margin-bottom:15px;
}

.history-item{
    padding:10px;
    margin-bottom:10px;
    background:rgba(255,255,255,.05);
    border-radius:10px;
    word-wrap:break-word;
}

.top-controls{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
}

.toggle{
    padding:8px 15px;
    border-radius:20px;
    border:none;
    cursor:pointer;
}

.light{
    background:#f5f5f5;
    color:#111;
}

.light .calculator,
.light .history{
    background:rgba(255,255,255,.7);
    color:#111;
}

.light button{
    color:#111;
}

@media(max-width:900px){

    .container{
        flex-direction:column;
    }

    .history{
        width:380px;
        height:250px;
    }

}

</style>
</head>
<body>

<div class="container">

<div class="calculator">

<div class="top-controls">
<button class="toggle">🌙 Theme</button>
</div>

<div class="header">
<h1>SmartCalc Pro</h1>
<p>Fast, Accurate & User-Friendly Calculator</p>
</div>

<div class="display">
<div class="previous"></div>
<div class="current">0</div>
</div>

<div class="buttons">

<button class="operator">AC</button>
<button class="operator">DEL</button>
<button class="operator">%</button>
<button class="operator">÷</button>

<button>7</button>
<button>8</button>
<button>9</button>
<button class="operator">×</button>

<button>4</button>
<button>5</button>
<button>6</button>
<button class="operator">−</button>

<button>1</button>
<button>2</button>
<button>3</button>
<button class="operator">+</button>

<button class="zero">0</button>
<button>.</button>
<button class="equal">=</button>

</div>

</div>

<div class="history">
<h2>📜 History</h2>
<div id="historyList"></div>
</div>

</div>

<script>

const current=document.querySelector(".current");
const previous=document.querySelector(".previous");
const buttons=document.querySelectorAll(".buttons button");
const historyList=document.getElementById("historyList");
const toggle=document.querySelector(".toggle");

let expression="";

function updateDisplay(){
current.textContent=expression || "0";
}

function addHistory(text){

const item=document.createElement("div");
item.classList.add("history-item");
item.textContent=text;

historyList.prepend(item);

if(historyList.children.length>15){
historyList.removeChild(
historyList.lastChild
);
}

}

function calculate(){

try{

let exp=expression
.replace(/×/g,"*")
.replace(/÷/g,"/")
.replace(/−/g,"-");

if(exp.includes("/0")){
throw Error();
}

let result=eval(exp);

if(
result===Infinity ||
isNaN(result)
){
throw Error();
}

previous.textContent=
expression + " =";

addHistory(
expression + " = " + result
);

expression=result.toString();

}

catch{
expression="Error";
}

updateDisplay();

}

buttons.forEach(btn=>{

btn.addEventListener("click",()=>{

const value=btn.textContent;

if(value==="AC"){

expression="";
previous.textContent="";

}

else if(value==="DEL"){

expression=
expression.slice(0,-1);

}

else if(value==="="){

calculate();

}

else if(value==="%"){

try{
expression=
(
parseFloat(expression)/100
).toString();
}
catch{
expression="Error";
}

}

else{

if(expression==="Error"){
expression="";
}

expression+=value;

}

updateDisplay();

});

});

document.addEventListener("keydown",(e)=>{

const key=e.key;

if("0123456789".includes(key))
expression+=key;

else if(
["+","-","*","/","."].
includes(key)
)
expression+=key;

else if(key==="Enter")
calculate();

else if(key==="Backspace")
expression=
expression.slice(0,-1);

else if(key==="Escape"){
expression="";
previous.textContent="";
}

updateDisplay();

});

toggle.addEventListener("click",()=>{

document.body.classList.toggle("light");

});

</script>

</body>
</html>
